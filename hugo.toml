baseURL = 'https://tmzh.me'
languageCode = 'en-us'
title = 'Ephemeral Dance Of Electrons'
theme = 'hugo-tufte'

# Pagination
[pagination]
pagerSize = 10

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    guessSyntax = true

# Theme parameters
[params]
  subtitle = "Ars Longa, Vita Brevis"
  showPoweredBy = false
  hidedate = false
  showSummary = true
  math = true
  KaTeXCDN = "https://cdn.jsdelivr.net/npm"
  KaTeXVersion = "0.16.9"
  codeblocksdark = false
  marginNoteInd = "⊕"
  sansSubtitle = false

# Navigation menu
[[menu.nav]]
  name = "Home"
  weight = 10
  url = "/"

[[menu.nav]]
  name = "Posts"
  weight = 20
  url = "/post/"

[[menu.nav]]
  name = "Tags"
  weight = 30
  url = "/tags/"

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
