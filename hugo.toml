baseURL = 'https://tmzh.github.io/'
theme = 'hugo-apero'
locale = 'en-us'
title = 'Ephemeral Dance Of Electrons'
author = 'tmzh'
enableEmoji = true

[pagination]
  pagerSize = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[params]
  orgName = 'tmzh'
  orgLocal = ''
  description = 'Ars Longa, Vita Brevis — Code and thought are a false dichotomy: both are an ephemeral dance of electrons.'
  favicon = '/images/favicon.ico'
  logo = ''
  mainSections = ['post']
  navallcaps = true
  socialInHeader = false
  socialInFooter = true
  sharing_image = ''
  twitter = 'tmzh_'

  # Color theme: peach (warm, content-first — matches docs site)
  theme = 'peach'
  custom_theme = ''

  # Fonts (match docs site: Commissioner body, Fraunces headings)
  customtextFontFamily = 'Commissioner'
  customheadingFontFamily = 'Fraunces'
  textFontFamily = 'sans-serif'
  headingFontFamily = 'sans-serif'

  # Math rendering
  [params.math]
    renderer = 'katex'

  # Social links
  [[params.social]]
    icon = 'github'
    icon_pack = 'fab'
    url = 'https://github.com/tmzh'

  [[params.social]]
    icon = 'x-twitter'
    icon_pack = 'fab'
    url = 'https://twitter.com/tmzh_'

  [[params.social]]
    icon = 'rss'
    icon_pack = 'fas'
    url = '/post/index.xml'

[menu]
  [[menu.header]]
    name = 'Home'
    title = 'Home'
    url = '/'
    weight = 10

  [[menu.header]]
    name = 'Posts'
    title = 'Posts'
    url = '/post/'
    weight = 20

  [[menu.header]]
    name = 'Tags'
    title = 'Tags'
    url = '/tags/'
    weight = 30

  [[menu.footer]]
    name = 'RSS'
    title = 'RSS Feed'
    url = '/post/index.xml'
    weight = 10
