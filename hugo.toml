baseURL = 'https://tmzh.github.io/'
languageCode = 'en-us'
title = 'Ephemeral Dance Of Electrons'
theme = 'tufte-custom'

# Pagination
[pagination]
pagerSize = 10

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    guessSyntax = true

# Theme parameters
[params]
  subtitle = "Ars Longa, Vita Brevis"

  # Hero Section description (optional, appears below subtitle)
  heroDescription = "Code and thought are a false dichotomy: both are an ephemeral dance of electrons."

  showPoweredBy = false
  hidedate = false
  showSummary = true
  math = true
  KaTeXCDN = "https://cdn.jsdelivr.net/npm"
  KaTeXVersion = "0.16.9"
  codeblocksdark = false
  marginNoteInd = "⊕"
  sansSubtitle = false

# Author information
[params.author]
  name = "tmzh"
  bio = "Engineer exploring the intersection of AI and human creativity. Building things, writing about discoveries, and occasionally breaking stuff along the way."
  avatar = "/images/avatar.svg"

  [[params.author.links]]
    name = "GitHub"
    url = "https://github.com/tmzh"

  [[params.author.links]]
    name = "Twitter"
    url = "https://twitter.com/tmzh_"

# Navigation menu
[[menu.nav]]
  name = "Home"
  weight = 10
  url = "/"

[[menu.nav]]
  name = "Posts"
  weight = 20
  url = "/post/"

[[menu.nav]]
  name = "Tags"
  weight = 30
  url = "/tags/"

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
